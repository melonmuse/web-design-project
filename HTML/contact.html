<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Shofuku</title>
  <link rel="stylesheet" href="CSS\base.css">
  <link rel="stylesheet" href="CSS\contact.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <nav>
    <a href="#" class="logo">SHOFUKU</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="order.html">Order</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>


  <main class="main">
    <div>
      <h1 class="headline">WE'RE ALWAYS LOOKING FOR WAYS TO IMPROVE.</h1>
      <p class="subtext">Tell us what made you smile or what you'd love to see more.</p>
    </div>
    <div class="card">
      <h2>Contact Form</h2>
      <div>
        <label for="feedback-email">Email Address</label>
        <input type="email" id="feedback-email" placeholder="Enter your email">
      </div>
      <label for="rating">How would you rate our service overall?</label>
      <div class="rating-row">
        <button class="rating-btn" type="button" title="Very bad">😞</button>
        <button class="rating-btn" type="button" title="Bad">🙁</button>
        <button class="rating-btn" type="button" title="Neutral">😐</button>
        <button class="rating-btn" type="button" title="Good">🙂</button>
        <button class="rating-btn" type="button" title="Great">😄</button>
      </div>
      <label for="feedback-reason">Please share the reason for your rating.</label>
      <input type="text" id="feedback-reason">
      <button class="btn-dark">Submit Feedback</button>
    </div>
  </main>


  <footer>
    <div class="footer-logo">SHOFUKU</div>
    <div>
      <h4>Address</h4>
      <address>
       Manila, Phillipines
      </address>
    </div>
    <div>
      <h4>Social Media</h4>
      <div class="footer-social">
        <a href="https://www.facebook.com/share/18RxdQk1fX/?mibextid=wwXIfr" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="https://www.instagram.com/shofukuph?igsh=MXZ4aWpyaHN4M3IxZQ==" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      </div>
    </div>
    <div>
      <h4>Email Us</h4>
      <p><a href="mailto:shofuku.ph@gmail.com">shofuku.ph@gmail.com</a></p>
    </div>
  </footer>
</body>
</html>
