<!DOCTYPE html>
<html>
  <header>
    <meta charset="utf-8">
    <title>Inquire</title>
  </header>
  <body>
    <nav>

    <div class="card contact-card">
    <h2 class="section-title">Contact Us</h2>
    <p class="contact-intro">
        Have a question, special request, or feedback? We’d love to hear from you.
    </p>
    <form class="contact-form">
        <label>Name</label>
        <input type="text" placeholder="Your name">

        <label>Email</label>
        <input type="email" placeholder="Your email">

        <label>Subject</label>
        <input type="text" placeholder="What is this about?">

        <label>Message</label>
        <textarea placeholder="Write your message here..."></textarea>

        <button class="button">Send Message</button>
    </form>
    </div>
    <div class="card contact-info">
        <h3 class="section-title">Other Ways to Reach Us</h3>
    
        <p><span class="highlight">Phone:</span> +971 XXX XXX XXX</p>
        <p><span class="highlight">Email:</span> hello@yourrestaurant.com</p>
        <p><span class="highlight">Location:</span> Abu Dhabi, UAE</p>
    </div>
  </body>
</html>
